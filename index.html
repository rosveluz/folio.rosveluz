<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rosveluz Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="#home" aria-label="Rosveluz home"><img src="img/rvz-blk.svg" alt="Rosveluz Logo" /></a>

      <nav class="desktop-nav" aria-label="Project categories">
        <button class="nav-pill is-active" type="button" data-filter="All">All</button>
        <button class="nav-pill" type="button" data-filter="Web Design">Web Design</button>
        <button class="nav-pill" type="button" data-filter="UIUX">UIUX</button>
        <button class="nav-pill" type="button" data-filter="Logo Design">Logo Design</button>
        <button class="nav-pill" type="button" data-filter="Graphics">Graphics</button>
        <button class="nav-pill" type="button" data-filter="Desktop Publishing">Desktop Publishing</button>
        <button class="filter-button" type="button" aria-label="Open sorting and filters" aria-expanded="false" data-filter-toggle>
          <img src="img/filter.svg" alt="" />
        </button>
      </nav>

      <button class="mobile-menu-button" type="button" aria-label="Open project categories" aria-expanded="false" data-menu-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>

      <a class="contact-button" href="#contact" aria-label="Open contact page">
        <img src="img/envelope.svg" alt="" />
      </a>

      <nav class="mobile-nav" aria-label="Mobile project categories" data-mobile-nav>
        <div class="mobile-nav-row">
          <button class="nav-pill is-active" type="button" data-filter="All">All</button>
          <button class="filter-button mobile-filter-button" type="button" aria-label="Open sorting and filters" aria-expanded="false" data-filter-toggle>
            <img src="img/filter.svg" alt="" />
          </button>
        </div>
        <button class="nav-pill" type="button" data-filter="Web Design">Web Design</button>
        <button class="nav-pill" type="button" data-filter="UIUX">UIUX</button>
        <button class="nav-pill" type="button" data-filter="Logo Design">Logo Design</button>
        <button class="nav-pill" type="button" data-filter="Graphics">Graphics</button>
        <button class="nav-pill" type="button" data-filter="Desktop Publishing">Desktop Publishing</button>
      </nav>
    </header>

    <main id="app" class="site-main" tabindex="-1"></main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="#">www.rosveluz.com</a>
        <a href="mailto:hello@rosveluz.com">hello@rosveluz.com</a>
      </div>
      <div class="footer-links">
        <a href="#">Blog</a>
        <a href="https://art.rosveluz.com/" target="_blank" rel="noopener noreferrer">art.rosveluz.com</a>
      </div>
      <div class="social-links" aria-label="Social links">
        <a href="#" aria-label="LinkedIn"><img src="img/linkedin.svg" alt="" /></a>
        <a href="#" aria-label="Instagram"><img src="img/instagram.svg" alt="" /></a>
        <a href="#" aria-label="Facebook"><img src="img/facebook.svg" alt="" /></a>
        <a class="mini-envelope" href="#contact" aria-label="Contact"><img src="img/envelope.svg" alt="" /></a>
      </div>
    </footer>
  </body>
</html>
